name: Dependency Graph

on:
  push:
  workflow_dispatch:
    inputs:
      dependencyGraphAction:
        type: choice
        description: 'Dependency graph action'
        required: true
        default: 'generate-and-submit'
        options:
          - generate-and-submit
          - generate-and-upload

permissions:
  contents: write

# cancel superseded runs on the same branch (different branches run in parallel)
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  dependency-graph:
    runs-on: ubuntu-latest

    steps:

    - name: Checkout
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      with:
        fetch-depth: 0

    - name: Set up JDK 17
      uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5.4.0
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Generate dependency graph
      uses: gradle/actions/dependency-submission@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0
      with:
        cache-provider: 'basic'
        # only the Build workflow writes the Gradle cache; reading here avoids
        # racing it for the same cache key when both run on the same push
        cache-read-only: true
        dependency-graph: ${{ github.event.inputs.dependencyGraphAction || 'generate-and-submit' }}
